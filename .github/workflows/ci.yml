name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.17"
      - name: Install deps
        run: uv sync --index-url https://pypi.tuna.tsinghua.edu.cn/simple
      - name: Lint backend
        run: uv run ruff check backend/
      - name: Lint SDK
        run: uv run ruff check sdk/
      - name: Test
        run: uv run pytest backend/tests/ -v

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.17"
      - name: Install SDK deps
        run: cd sdk && uv sync --index-url https://pypi.tuna.tsinghua.edu.cn/simple
      - name: Lint SDK
        run: cd sdk && uv run ruff check ml_platform/
      - name: Test SDK (smoke)
        run: cd sdk && uv run python -c "from ml_platform import Client; print('SDK import OK')"
