name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.17"
      - name: Install deps
        run: uv sync --index-url https://pypi.tuna.tsinghua.edu.cn/simple
      - name: Lint backend
        run: uv run ruff check backend/
      - name: Lint SDK
        run: uv run ruff check sdk/
      - name: Lint CLI
        run: uv run ruff check cli/
      - name: Test
        run: uv run pytest backend/tests/ -v

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.17"
      - name: Install SDK deps
        run: cd sdk && uv sync --index-url https://pypi.tuna.tsinghua.edu.cn/simple
      - name: Lint SDK
        run: cd sdk && uv run ruff check ml_platform/
      - name: Test SDK (smoke)
        run: cd sdk && uv run python -c "from ml_platform import Client; print('SDK import OK')"

  build:
    needs: [backend, sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.17"

      - name: Build SDK wheel
        run: cd sdk && uv build --index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Build CLI wheel
        run: |
          cd cli
          # First install SDK locally so the CLI can depend on it
          uv pip install ../sdk --index-url https://pypi.tuna.tsinghua.edu.cn/simple
          uv build --index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Upload SDK wheel
        uses: actions/upload-artifact@v4
        with:
          name: ml-platform-sdk
          path: sdk/dist/*.whl

      - name: Upload CLI wheel
        uses: actions/upload-artifact@v4
        with:
          name: ml-platform-cli
          path: cli/dist/*.whl

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download SDK wheel
        uses: actions/download-artifact@v4
        with:
          name: ml-platform-sdk
          path: dist/

      - name: Download CLI wheel
        uses: actions/download-artifact@v4
        with:
          name: ml-platform-cli
          path: dist/

      - name: Generate install script
        run: |
          cat > dist/install.sh << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          echo "Installing ML Platform CLI..."

          # Find wheel files in current directory
          SDK_WHEEL=$(ls ml_platform-*.whl 2>/dev/null | head -1)
          CLI_WHEEL=$(ls ml_platform_cli-*.whl 2>/dev/null | head -1)

          if [ -z "$SDK_WHEEL" ] || [ -z "$CLI_WHEEL" ]; then
            echo "Error: wheel files not found. Run this script from the release directory."
            exit 1
          fi

          echo "  SDK:  $SDK_WHEEL"
          echo "  CLI:  $CLI_WHEEL"
          echo ""

          if command -v uv &> /dev/null; then
            echo "Installing with uv..."
            uv tool install --from "$CLI_WHEEL" --with "$SDK_WHEEL" ml-platform-cli
          else
            echo "Installing with pip..."
            pip install "$SDK_WHEEL" "$CLI_WHEEL"
          fi

          echo ""
          echo "Done! Run 'mlp --help' to get started."
          SCRIPT
          chmod +x dist/install.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "ML Platform ${{ github.ref_name }}" \
            --notes-file - \
            dist/*.whl dist/install.sh << 'EOF'
          ## 🚀 ML Platform ${{ github.ref_name }}

          ### 一键安装

          ```bash
          # 1. 下载 install.sh 和两个 .whl 文件到同一目录
          # 2. 运行安装脚本
          bash install.sh
          ```

          ### 手动安装

          ```bash
          # uv 用户（推荐）
          uv tool install --from ml_platform_cli-*.whl --with ml_platform-*.whl ml-platform-cli

          # pip 用户
          pip install ml_platform-*.whl ml_platform_cli-*.whl
          ```

          ### 使用

          ```bash
          mlp auth login -e alice@test.com -p secret123
          mlp data upload iris.csv
          mlp experiments create -n demo -d <id> -t target --type classification
          mlp experiments run-sklearn <exp-id>
          mlp queue watch
          mlp status
          ```

          ### 产物

          | 文件 | 说明 |
          |------|------|
          | `ml_platform_cli-*.whl` | CLI 命令行工具 (typer + rich, 30+ 命令) |
          | `ml_platform-*.whl` | Python SDK (httpx 封装) |
          | `install.sh` | 一键安装脚本 |
          EOF
