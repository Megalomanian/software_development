name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.17"
      - name: Install deps
        run: uv sync --index-url https://pypi.tuna.tsinghua.edu.cn/simple
      - name: Lint
        run: uv run ruff check backend/
      - name: Test
        run: uv run pytest backend/tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npx tsc --noEmit
      - run: npx next lint
      - run: npx next build
